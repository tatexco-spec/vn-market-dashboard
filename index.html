<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChungKhoanNT.com - Trang chuyên phân tích cơ bản cho Dân phân tích kỹ thuật</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <style>
    :root {
      --bg:#0b0d10; --panel:#12151a; --text:#dce3ea; --muted:#8b95a5; --accent:#3b82f6; --grid:#1f242d;
    }
    body.light {
      --bg:#ffffff; --panel:#f4f6f8; --text:#1f2937; --muted:#6b7280; --accent:#2563eb; --grid:#e5e7eb;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background: var(--bg); color: var(--text); }
    header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background: var(--panel); border-bottom:1px solid #1a1f27; position: sticky; top:0; z-index:5; }
    .brand { display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.2px; }
    .brand .dot { width:10px; height:10px; border-radius:50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
    .controls { display:flex; gap:8px; align-items:center; flex-wrap: wrap; }
    .controls input, .controls select, .controls button {
      background:#0f1117; color:var(--text); border:1px solid #2a313d; padding:8px 10px; border-radius:10px; outline:none;
    }
    .controls input:focus, .controls select:focus { border-color: var(--accent); }
    .controls button { cursor: pointer; font-weight:600; }
    .controls button.primary { background: var(--accent); border-color:transparent; color:white; }
    /* Chiếm trọn phần còn lại của viewport, không để khoảng hở dưới */
    .layout {
      display:grid;
      grid-template-rows: 78% 22%;   /* tỉ lệ giá/vol, muốn khác thì đổi % */
      gap:0;                          /* xoá khe giữa 2 pane */
      padding:10px;
      height: var(--layout-h, 80vh);  /* sẽ được tính tự động bằng JS */
    }

    /* Cho phép chart co giãn hoàn toàn theo container */
    .chart, .volume {
      height: auto;
      min-height: 0;
      position: relative;
    }

    /* Tránh rò rỉ khoảng trống bên trong thẻ chứa */
    .card {
      background: var(--panel);
      border:1px solid #1a1f27;
      border-radius:14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      overflow: hidden;               /* quan trọng để tràn đầy đẹp */
    }
        .status { font-size:12px; color: var(--muted); }
    .footer { padding: 8px 12px; font-size: 12px; color: var(--muted); text-align: right; }
    .row { display:flex; gap:8px; align-items:center; }
    .spacer { flex:1; }

    /* Ẩn bất cứ watermark/logo nào có chứa "tradingview" trong thuộc tính href/class (phòng khi lib thêm) */
    #chart a[href*="tradingview"], #volume a[href*="tradingview"],
    #chart [class*="tradingview"], #volume [class*="tradingview"],
    #chart [class*="watermark"], #volume [class*="watermark"] { display:none !important; }

    @media (max-width: 720px) {
      .chart { height: 58vh; }
      .volume { height: 22vh; }
      .controls { gap:6px; }
    }
  </style>
  <!-- Lightweight Charts (không phải widget TradingView) -->
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header>
    <div style="display: flex; align-items: center;">
      <div class="brand"><div class="dot"></div> <div>ChungKhoanNT.com - Trang chuyên phân tích cơ bản cho Dân phân tích kỹ thuật</div></div>
      <div class="status" id="status" style="margin-left: 24px;">Sẵn sàng.</div>
    </div>
    <div class="controls">
        <div class="row">
          <label for="symbol" style="color:var(--muted); font-size:12px;">Mã</label>
          <input id="symbol" value="HPG" size="6" />
        </div>
        <div class="row">
          <label for="start" style="color:var(--muted); font-size:12px;">Từ</label>
          <input id="start" type="date" />
        </div>
        <div class="row">
          <label for="end" style="color:var(--muted); font-size:12px;">Đến</label>
          <input id="end" type="date" />
        </div>
        <select id="preset" title="Khoảng thời gian">
          <option value="-1" selected>Toàn bộ lịch sử</option>
          <option value="365">1 năm</option>
          <option value="180">6 tháng</option>
          <option value="90">3 tháng</option>
          <option value="30">1 tháng</option>
          <option value="7">1 tuần</option>
          <option value="0">Tùy chọn</option>
        </select>
        <button class="primary" id="load">Tải dữ liệu</button>
        <button id="toggle-theme" title="Chuyển chế độ">🌙</button>
    </div>
  </header>

  <main style="padding:10px;">
    <div class="card layout">
      <div id="chart" class="chart"></div>
      <div id="volume" class="volume"></div>
    </div>
  </main>

  <script>
    const $ = (s) => document.querySelector(s);
    // Tính chiều cao thực tế cho .layout để lấp đầy màn hình
    function sizeLayout() {
      const h = window.innerHeight;
      const headerH = document.querySelector('header')?.offsetHeight || 0;
      // 20 là tổng padding top/bottom của <main> (10px + 10px)
      // Không còn footerH và statusH ở vị trí cũ nữa
      const layoutH = h - headerH - 20;
      document.querySelector('.layout').style.setProperty('--layout-h', layoutH + 'px');
    }

    window.addEventListener('resize', sizeLayout);
    sizeLayout();    
    const statusEl = $('#status');
    const RIGHT_OFFSET = 20; // số "cột" trống ở mép phải

    function setStatus(t){ statusEl.textContent = t; }

    // Charts
    const chart = LightweightCharts.createChart($('#chart'), {
      layout: { background:{ type:'solid', color:'transparent' }, textColor:'#c7d2e0' },
      rightPriceScale: { borderColor:'#2b3240' },
      timeScale: { borderColor:'#2b3240', timeVisible:true, rightOffset: RIGHT_OFFSET, secondsVisible:false },
      grid: { vertLines:{ color:'#1f242d' }, horzLines:{ color:'#1f242d' } },
      crosshair: { mode: 0 },
      handleScale: { mouseWheel: true, pinch: true, axisPressedMouseMove: true },
      handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true },
      autoSize: true,
    });
    const candleSeries = chart.addCandlestickSeries({
      upColor: '#26a69a', downColor:'#ef5350', borderVisible:false, wickUpColor:'#26a69a', wickDownColor:'#ef5350',
    });

    const volChart = LightweightCharts.createChart($('#volume'), {
      layout: { background:{ type:'solid', color:'transparent' }, textColor:'#c7d2e0' },
      rightPriceScale: { borderColor:'#2b3240' },
      timeScale: { borderColor:'#2b3240', timeVisible:true, rightOffset: RIGHT_OFFSET, secondsVisible:false },
      grid: { vertLines:{ color:'#1f242d' }, horzLines:{ color:'#1f242d' } },
      handleScale: { mouseWheel: true, pinch: true, axisPressedMouseMove: true },
      handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true },
      autoSize: true,
    });
    const volumeSeries = volChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: '', base: 0 });

    function ensureRightGap() {
      chart.timeScale().applyOptions({ rightOffset: RIGHT_OFFSET });
      volChart.timeScale().applyOptions({ rightOffset: RIGHT_OFFSET });
    }

    // Sync time scales (logical range giữ được khoảng trống & rightOffset)
    function syncScales(master, slave) {
      let syncing = false;
      master.timeScale().subscribeVisibleLogicalRangeChange(() => {
        if (syncing) return;
        const lr = master.timeScale().getVisibleLogicalRange();
        if (!lr) return;
        syncing = true;
        slave.timeScale().setVisibleLogicalRange(lr);
        syncing = false;
      });
    }
    syncScales(chart, volChart);
    syncScales(volChart, chart);

    // Resize observer (không fitContent để giữ trạng thái & whitespace)
    const ro1 = new ResizeObserver(() => { ensureRightGap(); });
    const ro2 = new ResizeObserver(() => { ensureRightGap(); });
    ro1.observe($('#chart'));
    ro2.observe($('#volume'));

    async function loadData() {
      const symbol = $('#symbol').value.trim().toUpperCase();
      const start = $('#start').value || undefined;
      const end = $('#end').value || undefined;

      const params = new URLSearchParams({ symbol });
      if (start) params.append('start', start);
      if (end) params.append('end', end);

      setStatus('Đang tải dữ liệu (toàn bộ lịch sử)...');
      const res = await fetch(`/api/ohlcv?${params.toString()}`);
      if (!res.ok) { setStatus('Lỗi tải dữ liệu: ' + res.status); return; }
      const data = await res.json();
      const rows = data.rows || [];

      const candles = rows.map(r => ({ time: r.time, open: r.open, high: r.high, low: r.low, close: r.close }));
      const vols = rows.map(r => ({ time: r.time, value: r.volume, color: (r.close >= r.open) ? '#26a69a' : '#ef5350' }));

      candleSeries.setData(candles);
      volumeSeries.setData(vols);

      // Chỉ hiển thị 300 cây nến đầu tiên (từ đầu lịch sử)
      const INIT_BARS = 300;
      const last = Math.min(INIT_BARS - 1, candles.length - 1);
      chart.timeScale().setVisibleLogicalRange({ from: 0, to: last });
      volChart.timeScale().setVisibleLogicalRange({ from: 0, to: last });

      // Giữ khoảng trống mép phải
      ensureRightGap();

      setStatus(`Đã tải ${rows.length} phiên cho ${data.symbol}.`);
      // Ẩn mọi anchor không mong muốn (phòng khi lib thay đổi)
      document.querySelectorAll('#chart a, #volume a').forEach(a => {
        const href = (a.getAttribute('href') || '').toLowerCase();
        if (href.includes('tradingview')) { a.remove(); }
      });
    }

    function applyPreset(days) {
      const now = new Date();
      if (Number(days) === -1) { // Full
        $('#start').value = '';
        $('#end').value = '';
        return;
      }
      const end = now.toISOString().slice(0,10);
      if (Number(days) > 0) {
        const startDate = new Date(now.getTime() - Number(days) * 86400000);
        const start = startDate.toISOString().slice(0,10);
        $('#start').value = start;
        $('#end').value = end;
      } else {
        $('#start').value = '';
        $('#end').value = '';
      }
    }
    $('#preset').addEventListener('change', (e) => applyPreset(e.target.value));
    $('#load').addEventListener('click', loadData);

    // Initial: full history by default
    applyPreset($('#preset').value);
    loadData();
    // Theme toggle
    const themeBtn = $('#toggle-theme');
    let isLight = false;

    themeBtn.addEventListener('click', () => {
      isLight = !isLight;
      document.body.classList.toggle('light', isLight);
      themeBtn.textContent = isLight ? '☀️' : '🌙';

      // Đổi màu chart khi đổi theme
      const colors = isLight
        ? { bg:'#ffffff', text:'#1f2937', grid:'#e5e7eb', up:'#26a69a', down:'#ef5350' }
        : { bg:'#0b0d10', text:'#c7d2e0', grid:'#1f242d', up:'#26a69a', down:'#ef5350' };

      chart.applyOptions({
        layout: { background:{ type:'solid', color:'transparent' }, textColor: colors.text },
        grid: { vertLines:{ color: colors.grid }, horzLines:{ color: colors.grid } }
      });
      candleSeries.applyOptions({ upColor: colors.up, downColor: colors.down, wickUpColor: colors.up, wickDownColor: colors.down });

      volChart.applyOptions({
        layout: { background:{ type:'solid', color:'transparent' }, textColor: colors.text },
        grid: { vertLines:{ color: colors.grid }, horzLines:{ color: colors.grid } }
      });
    });    
  </script>
</body>
</html>
